name: Build Preview

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build'
        required: true
        default: 'main'
        type: string
      build_android:
        description: 'Build Android'
        required: true
        default: true
        type: boolean
      build_ios:
        description: 'Build iOS'
        required: true
        default: true
        type: boolean
      build_macos:
        description: 'Build macOS'
        required: true
        default: true
        type: boolean
      build_windows:
        description: 'Build Windows'
        required: true
        default: true
        type: boolean
      build_linux:
        description: 'Build Linux'
        required: true
        default: true
        type: boolean

jobs:
  android:
    name: Android Build
    if: ${{ github.event.inputs.build_android == 'true' }}
    runs-on: ubuntu-latest
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: flutter pub get

      # Remove desktop TorrServer binaries to reduce APK size
      - name: Strip Desktop Binaries
        run: rm -f packages/flutter_torrent_server/assets/torrserver/TorrServer-*

      - name: Decode Keystore
        if: env.ANDROID_KEYSTORE_BASE64 != ''
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/release.jks
          echo "storePassword=$ANDROID_STORE_PASSWORD" > android/key.properties
          echo "keyPassword=$ANDROID_KEY_PASSWORD" >> android/key.properties
          echo "keyAlias=$ANDROID_KEY_ALIAS" >> android/key.properties
          echo "storeFile=release.jks" >> android/key.properties

      - name: Build Split APKs
        run: flutter build apk --release --split-per-abi

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: android-apks
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 7

  ios:
    name: iOS Build (Unsigned)
    if: ${{ github.event.inputs.build_ios == 'true' }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: flutter pub get

      - name: Build iOS (No Codesign)
        run: |
          flutter build ios --release --no-codesign
          mkdir -p Payload
          mv build/ios/iphoneos/Runner.app Payload/
          zip -r skystream-ios-unsigned.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: skystream-ios-unsigned.ipa
          retention-days: 7

  macos:
    name: macOS Build (${{ matrix.arch }})
    if: ${{ github.event.inputs.build_macos == 'true' }}
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [arm64, x64]
        include:
          - arch: arm64
            torrserver_binary: TorrServer-darwin-arm64
          - arch: x64
            torrserver_binary: TorrServer-darwin-amd64
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: |
          flutter config --enable-macos-desktop
          flutter pub get

      - name: Strip Unused Binaries
        run: |
          cd packages/flutter_torrent_server/assets/torrserver
          find . -type f ! -name "${{ matrix.torrserver_binary }}" -delete

      - name: Build macOS
        run: flutter build macos --release

      - name: Zip Bundle
        run: |
          cd build/macos/Build/Products/Release
          zip -r "../../../../../skystream-macos-${{ matrix.arch }}.zip" skystream.app

      - name: Upload macOS Build
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}
          path: skystream-macos-${{ matrix.arch }}.zip
          retention-days: 7

  windows:
    name: Windows Build
    if: ${{ github.event.inputs.build_windows == 'true' }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: |
          flutter config --enable-windows-desktop
          flutter pub get

      - name: Strip Unused Binaries
        run: |
          cd packages/flutter_torrent_server/assets/torrserver
          Get-ChildItem -File | Where-Object { $_.Name -ne "TorrServer-windows-amd64.exe" } | Remove-Item

      - name: Build Windows
        run: flutter build windows --release

      - name: Compress Release
        run: |
          Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath "skystream-windows.zip"

      - name: Upload Windows Build
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: skystream-windows.zip
          retention-days: 7

  linux:
    name: Linux Build
    if: ${{ github.event.inputs.build_linux == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Linux Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libmpv-dev

      - name: Install Flutter Dependencies
        run: |
          flutter config --enable-linux-desktop
          flutter pub get

      - name: Strip Unused Binaries
        run: |
          cd packages/flutter_torrent_server/assets/torrserver
          find . -type f ! -name "TorrServer-linux-amd64" -delete

      - name: Build Linux
        run: flutter build linux --release

      - name: Compress Release
        run: |
          cd build/linux/x64/release/bundle
          tar -czvf "../../../../../skystream-linux.tar.gz" .

      - name: Upload Linux Build
        uses: actions/upload-artifact@v4
        with:
          name: linux
          path: skystream-linux.tar.gz
          retention-days: 7